name: CI — Build & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Auto-format with Prettier
        run: npx prettier --write "src/**/*.{ts,tsx,css}" "eslint.config.js"

      - name: Run ESLint
        run: npm run lint -- --max-warnings=50

      - name: Build production bundle
        run: npm run build

      - name: Confirm build
        run: |
          find .output -maxdepth 2 -type f | head -20
          echo "✅ Build complete"
