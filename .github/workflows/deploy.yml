name: Deploy — Cloudflare Pages

# This workflow deploys to Cloudflare Pages.
# It requires two repository secrets to be set first:
#   1. Go to: https://github.com/kelvin-og/-touch-by-bel-voma/settings/secrets/actions
#   2. Add: CLOUDFLARE_API_TOKEN  (from https://dash.cloudflare.com/profile/api-tokens)
#   3. Add: CLOUDFLARE_ACCOUNT_ID (from Cloudflare dashboard sidebar)
#   4. Create a Cloudflare Pages project named: touch-by-belvoma

on:
  workflow_dispatch:
  # Uncomment to auto-deploy on every push to main once secrets are configured:
  # push:
  #   branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build production bundle
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-deploy-${{ github.sha }}
          path: .output/public
          retention-days: 1

  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      deployments: write

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: cloudflare-deploy-${{ github.sha }}
          path: dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: touch-by-belvoma
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: "3"
