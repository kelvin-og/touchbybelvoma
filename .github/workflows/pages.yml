name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Auto-format with Prettier
        run: npx prettier --write "src/**/*.{ts,tsx,css}" "eslint.config.js"

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Generate index.html
        run: |
          cd .output/public

          # Find the actual hashed asset filenames
          INDEX_JS=$(ls assets/index-*.js 2>/dev/null | head -1 || ls assets/routes-*.js 2>/dev/null | head -1)
          STYLES_CSS=$(ls assets/styles-*.css 2>/dev/null | head -1)

          echo "JS entry: $INDEX_JS"
          echo "CSS entry: $STYLES_CSS"

          # Build the index.html with correct asset references
          cat > index.html << HTMLEOF
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>Touch by Bel'voma | Luxury Jewelry in Ghana</title>
              <meta name="description" content="Luxury handcrafted gold-plated jewelry. Shop earrings, necklaces, rings and bracelets in Ghana." />
              <link rel="icon" href="./favicon.png" />
              $([ -n "$STYLES_CSS" ] && echo "<link rel=\"stylesheet\" crossorigin href=\"./$STYLES_CSS\">")
              $([ -n "$INDEX_JS" ] && echo "<script type=\"module\" crossorigin src=\"./$INDEX_JS\"></script>")
            </head>
            <body>
              <div id="root"></div>
            </body>
          </html>
          HTMLEOF

          # Copy as 404.html so all client-side routes work
          cp index.html 404.html

          # Prevent Jekyll processing
          touch .nojekyll

          echo "=== Generated index.html ==="
          cat index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ".output/public"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
