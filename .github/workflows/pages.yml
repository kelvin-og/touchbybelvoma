name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build static SPA
        run: npm run build:static
        env:
          NODE_ENV: production

      - name: Copy dist/ to docs/ and repo root
        run: node make-docs.mjs

      - name: Commit and push deploy artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ assets/ index.html 404.html .nojekyll favicon.png robots.txt
          git diff --cached --quiet || git commit -m "chore: deploy static build [skip ci]"
          git push origin main
